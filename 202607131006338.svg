<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f5f8f"/>
    </marker>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #16212f; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5f6f82; }
      .step { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #16212f; }
      .label { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .code { font: 700 15px "SFMono-Regular", Consolas, monospace; fill: #1e3a5f; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; rx: 16; }
      .axis { stroke: #8a99aa; stroke-width: 2; }
      .grid { stroke: #e8edf3; stroke-width: 1; }
      .blue { stroke: #1769aa; }
      .red { stroke: #c84646; }
      .green { stroke: #287a4f; }
      .amber { stroke: #a66a00; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#f4f7fb"/>

  <text x="640" y="52" text-anchor="middle" class="title">脉冲编码调制 PCM 示意图</text>
  <text x="640" y="84" text-anchor="middle" class="subtitle">Analog Signal → Sampling → Quantization → Binary Encoding</text>

  <!-- Panels -->
  <rect x="38" y="125" width="275" height="430" class="panel"/>
  <rect x="353" y="125" width="275" height="430" class="panel"/>
  <rect x="668" y="125" width="275" height="430" class="panel"/>
  <rect x="983" y="125" width="260" height="430" class="panel"/>

  <!-- Arrows -->
  <line x1="316" y1="340" x2="349" y2="340" stroke="#2f5f8f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="631" y1="340" x2="664" y2="340" stroke="#2f5f8f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="946" y1="340" x2="979" y2="340" stroke="#2f5f8f" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <text x="175.5" y="166" text-anchor="middle" class="step">1. 模拟信号</text>
  <text x="175.5" y="194" text-anchor="middle" class="small">连续变化的原始信号</text>
  <g transform="translate(68,228)">
    <line x1="0" y1="135" x2="210" y2="135" class="axis"/>
    <line x1="0" y1="20" x2="0" y2="250" class="axis"/>
    <path d="M0,135
             C18,75 34,55 52,82
             C72,112 84,198 105,205
             C128,214 142,104 162,74
             C181,46 194,82 210,135"
          fill="none" class="blue" stroke-width="5"/>
    <text x="196" y="158" class="small">t</text>
    <text x="10" y="34" class="small">幅度</text>
  </g>
  <text x="175.5" y="520" text-anchor="middle" class="label">例如：声音、电压、温度变化</text>

  <!-- Step 2 -->
  <text x="490.5" y="166" text-anchor="middle" class="step">2. 采样</text>
  <text x="490.5" y="194" text-anchor="middle" class="small">每隔固定时间测量一次</text>
  <g transform="translate(383,228)">
    <line x1="0" y1="135" x2="210" y2="135" class="axis"/>
    <line x1="0" y1="20" x2="0" y2="250" class="axis"/>
    <path d="M0,135
             C18,75 34,55 52,82
             C72,112 84,198 105,205
             C128,214 142,104 162,74
             C181,46 194,82 210,135"
          fill="none" stroke="#9bb8d2" stroke-width="4"/>
    <g class="red" stroke-width="2">
      <line x1="18" y1="135" x2="18" y2="83"/>
      <line x1="45" y1="135" x2="45" y2="70"/>
      <line x1="72" y1="135" x2="72" y2="114"/>
      <line x1="99" y1="135" x2="99" y2="202"/>
      <line x1="126" y1="135" x2="126" y2="196"/>
      <line x1="153" y1="135" x2="153" y2="88"/>
      <line x1="180" y1="135" x2="180" y2="61"/>
      <line x1="207" y1="135" x2="207" y2="128"/>
    </g>
    <g fill="#c84646">
      <circle cx="18" cy="83" r="6"/>
      <circle cx="45" cy="70" r="6"/>
      <circle cx="72" cy="114" r="6"/>
      <circle cx="99" cy="202" r="6"/>
      <circle cx="126" cy="196" r="6"/>
      <circle cx="153" cy="88" r="6"/>
      <circle cx="180" cy="61" r="6"/>
      <circle cx="207" cy="128" r="6"/>
    </g>
    <text x="112" y="277" text-anchor="middle" class="code">采样间隔 Δt</text>
  </g>
  <text x="490.5" y="520" text-anchor="middle" class="label">得到一组离散样本</text>

  <!-- Step 3 -->
  <text x="805.5" y="166" text-anchor="middle" class="step">3. 量化</text>
  <text x="805.5" y="194" text-anchor="middle" class="small">把样本近似到有限等级</text>
  <g transform="translate(698,228)">
    <line x1="0" y1="135" x2="210" y2="135" class="axis"/>
    <line x1="0" y1="20" x2="0" y2="250" class="axis"/>
    <g class="grid">
      <line x1="0" y1="55" x2="210" y2="55"/>
      <line x1="0" y1="95" x2="210" y2="95"/>
      <line x1="0" y1="135" x2="210" y2="135"/>
      <line x1="0" y1="175" x2="210" y2="175"/>
      <line x1="0" y1="215" x2="210" y2="215"/>
    </g>
    <path d="M18,95 L45,95 L45,95 L72,95 L72,135 L99,135 L99,215 L126,215 L126,175 L153,175 L153,95 L180,95 L180,55 L207,55"
          fill="none" class="green" stroke-width="5" stroke-linejoin="round"/>
    <g fill="#287a4f">
      <circle cx="18" cy="95" r="5"/>
      <circle cx="45" cy="95" r="5"/>
      <circle cx="72" cy="135" r="5"/>
      <circle cx="99" cy="215" r="5"/>
      <circle cx="126" cy="175" r="5"/>
      <circle cx="153" cy="95" r="5"/>
      <circle cx="180" cy="55" r="5"/>
      <circle cx="207" cy="55" r="5"/>
    </g>
    <text x="5" y="58" class="small">7</text>
    <text x="5" y="98" class="small">6</text>
    <text x="5" y="138" class="small">5</text>
    <text x="5" y="178" class="small">4</text>
    <text x="5" y="218" class="small">3</text>
  </g>
  <text x="805.5" y="520" text-anchor="middle" class="label">连续值 → 离散等级</text>

  <!-- Step 4 -->
  <text x="1113" y="166" text-anchor="middle" class="step">4. 编码</text>
  <text x="1113" y="194" text-anchor="middle" class="small">把量化值变成二进制</text>
  <g transform="translate(1010,230)">
    <rect x="0" y="0" width="205" height="250" rx="12" fill="#eef5fa" stroke="#c8d8e8"/>
    <text x="22" y="38" class="code">等级 6 → 110</text>
    <text x="22" y="72" class="code">等级 6 → 110</text>
    <text x="22" y="106" class="code">等级 5 → 101</text>
    <text x="22" y="140" class="code">等级 3 → 011</text>
    <text x="22" y="174" class="code">等级 4 → 100</text>
    <text x="22" y="208" class="code">等级 7 → 111</text>
    <line x1="18" y1="226" x2="187" y2="226" stroke="#b7cadc"/>
    <text x="22" y="246" class="code">110 110 101 ...</text>
  </g>
  <text x="1113" y="520" text-anchor="middle" class="label">输出数字比特流</text>

  <!-- Bottom summary -->
  <rect x="110" y="610" width="1060" height="90" rx="18" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>
  <text x="640" y="645" text-anchor="middle" class="step">PCM 三步核心</text>
  <text x="640" y="678" text-anchor="middle" class="label">采样：定时测量　→　量化：近似到等级　→　编码：转换为二进制</text>
  <text x="640" y="706" text-anchor="middle" class="small">模拟信号经过 PCM 后，就变成计算机可以存储、处理和传输的数字数据。</text>
</svg>
